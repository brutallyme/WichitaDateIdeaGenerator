<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wichita, KS - Date Idea Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1em;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 30px;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        .result.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .idea-card {
            background: #f8f9fa;
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .idea-label {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .idea-value {
            color: #333;
            font-size: 1.4em;
            font-weight: 500;
        }

        .refresh-hint {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💑 Date Night Ideas</h1>
        <p class="subtitle">Get random inspiration for your next date!</p>
        
        <button onclick="generateDateIdea()">Generate Date Idea</button>

        <div id="result" class="result">
            <div class="idea-card">
                <div class="idea-label">🍽️ Restaurant Style</div>
                <div class="idea-value" id="restaurant"></div>
            </div>

            <div class="idea-card">
                <div class="idea-label">👔 Dress Code</div>
                <div class="idea-value" id="dressCode"></div>
            </div>

            <div class="idea-card">
                <div class="idea-label">🎭 After-Meal Activity</div>
                <div class="idea-value" id="activity"></div>
            </div>

            <p class="refresh-hint">Click the button again for another idea!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
